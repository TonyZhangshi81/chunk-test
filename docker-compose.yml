version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:3306"          # 主机端口:容器端口
    environment:
      MYSQL_ROOT_PASSWORD: Tony19811031
      MYSQL_DATABASE: myapp
      MYSQL_USER: tony
      MYSQL_PASSWORD: Tony19811031
    volumes:
      - C:\WorkProject\ai-agent\investigation\chunk-test\docker\mysql_data:/var/lib/mysql
      # 可选：挂载自定义配置文件
      # - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    restart: unless-stopped
    networks:
      - dev-network

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"          # API 端口
      - "9001:9001"          # Web 控制台端口
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - C:\WorkProject\ai-agent\investigation\chunk-test\docker\minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - dev-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "15432:5432"         # 主机端口:容器端口
    environment:
      POSTGRES_USER: tony
      POSTGRES_PASSWORD: Tony19811031
      POSTGRES_DB: myapp
    volumes:
      - C:\WorkProject\ai-agent\investigation\chunk-test\docker\postgres_data:/var/lib/postgresql/data
      # 可选：初始化脚本（自动启用 vector 扩展）
      # - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge